<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Mark: 10× + claw -->
  <g filter="url(#shadow)" transform="translate(70,60)">
    <!-- Outer plate -->
    <path d="M40 0H220C242.091 0 260 17.909 260 40V200C260 222.091 242.091 240 220 240H40C17.909 240 0 222.091 0 200V40C0 17.909 17.909 0 40 0Z" fill="#0B1220"/>
    <path d="M40 4H220C239.882 4 256 20.118 256 40V200C256 219.882 239.882 236 220 236H40C20.118 236 4 219.882 4 200V40C4 20.118 20.118 4 40 4Z" stroke="#22304A" stroke-width="2"/>

    <!-- 10x glyph -->
    <path d="M70 80V170" stroke="url(#g)" stroke-width="14" stroke-linecap="square"/>
    <path d="M105 80H145C165 80 178 95 178 115C178 135 165 150 145 150H105V80Z" stroke="url(#g)" stroke-width="14" stroke-linejoin="miter"/>
    <path d="M208 92L186 114L208 136" stroke="url(#g)" stroke-width="12" stroke-linecap="square" stroke-linejoin="miter"/>

    <!-- claw: three talons -->
    <path d="M78 198C86 172 102 164 126 162" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
    <path d="M112 206C118 178 136 168 160 166" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
    <path d="M150 206C154 186 170 176 192 174" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>

    <!-- notch accents -->
    <path d="M22 54H52" stroke="#22304A" stroke-width="4"/>
    <path d="M208 54H238" stroke="#22304A" stroke-width="4"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(380,110)">
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace" font-size="72" font-weight="700" fill="#0B1220">10xclaw</text>
    <text x="0" y="44" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace" font-size="18" font-weight="500" fill="#475569">automation • audits • execution</text>
  </g>
</svg>
