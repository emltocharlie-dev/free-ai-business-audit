<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 320" fill="none">
  <defs>
    <!-- Direction 2: Aggressive memory (X becomes claw-cut) -->
    <linearGradient id="gradClaw" x1="240" y1="70" x2="1180" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="0.45" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="softShadow2" x="-20%" y="-50%" width="140%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0B1220" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- Wordmark split: '10' + custom X + 'CLAW' -->
  <g filter="url(#softShadow2)">
    <!-- 10 -->
    <text
      x="120" y="220"
      font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Inter, Arial"
      font-size="150"
      font-weight="800"
      letter-spacing="4"
      fill="url(#gradClaw)"
      stroke="#0B1220"
      stroke-opacity="0.18"
      stroke-width="4"
      paint-order="stroke fill"
    >10</text>

    <!-- Custom X: two blades + 3 claw notches on the right stroke -->
    <g transform="translate(392,54)" fill="url(#gradClaw)" stroke="#0B1220" stroke-opacity="0.18" stroke-width="4" paint-order="stroke fill">
      <!-- blade 1 -->
      <path d="M18 0 L78 0 L170 112 L110 112 Z"/>
      <path d="M110 112 L170 112 L78 224 L18 224 Z"/>
      <!-- blade 2 -->
      <path d="M170 0 L230 0 L138 112 L78 112 Z"/>
      <path d="M78 112 L138 112 L230 224 L170 224 Z"/>

      <!-- claw notches (cuts) -->
      <path d="M212 82 l58 -28 l10 18 l-58 28 Z" fill="#F59E0B" fill-opacity="0.95" stroke="none"/>
      <path d="M216 120 l62 -22 l9 18 l-62 22 Z" fill="#F59E0B" fill-opacity="0.78" stroke="none"/>
      <path d="M210 156 l58 -16 l8 18 l-58 16 Z" fill="#F59E0B" fill-opacity="0.62" stroke="none"/>
    </g>

    <!-- CLAW -->
    <text
      x="690" y="220"
      font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Inter, Arial"
      font-size="150"
      font-weight="800"
      letter-spacing="4"
      fill="url(#gradClaw)"
      stroke="#0B1220"
      stroke-opacity="0.18"
      stroke-width="4"
      paint-order="stroke fill"
    >CLAW</text>
  </g>

  <!-- NOTE: This is a high-fidelity preview; final can be redrawn as pure paths for perfect consistency across renderers. -->
</svg>
