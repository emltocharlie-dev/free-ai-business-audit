    L1300 165
    M1285 125
    L1285 150
    " stroke="url(#clawWord)" stroke-width="35" stroke-linejoin="round" fill="url(#clawWord)"/>

  <!-- W (motion peaks) -->
  <path d="M1410 55 L1455 55 L1485 150 L1515 55 L1560 55 L1515 235 L1470 235 L1440 150 L1410 235 L1365 235 L1320 55 L1365 55 L1395 150 L1410 55 Z" transform="translate(-105,0)" fill="url(#clawWord)"/>
