<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 280" fill="none">
  <defs>
    <linearGradient id="clawWord" x1="100" y1="40" x2="1300" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22C55E"/>
      <stop offset="0.6" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#EF4444"/>
    </linearGradient>
  </defs>

  <!-- 10XCLAW wordmark - Direction C: Claw Forward -->
  <!-- Dynamic, angled, motion-oriented -->

  <!-- 1 (forward lean) -->
  <path d="M155 60 L180 60 L205 220 L170 220 Z" fill="url(#clawWord)"/>
  <path d="M140 85 L175 55 L215 85 L200 115 L175 95 L150 115 Z" fill="url(#clawWord)"/>

  <!-- 0 (dynamic oval) -->
  <path fill-rule="evenodd" d="
    M345 60
    C390 60 430 100 430 150
    C430 200 390 240 345 240
    C300 240 260 200 260 150
    C260 100 300 60 345 60
    Z
    M345 100
    C320 100 305 120 305 150
    C305 180 320 200 345 200
    C370 200 385 180 385 150
    C385 120 370 100 345 100
    Z" fill="url(#clawWord)"/>

  <!-- X (dynamic cross) -->
  <path d="M480 55 L550 55 L610 135 L670 55 L740 55 L645 145 L740 235 L670 235 L610 155 L550 235 L480 235 L575 145 Z" fill="url(#clawWord)"/>

  <!-- C (swooping curve) -->
  <path fill-rule="evenodd" d="
