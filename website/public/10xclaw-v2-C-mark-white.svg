<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Direction C: Claw Forward - Monochrome White -->
  <g stroke="#FFFFFF" fill="#FFFFFF">
    <!-- Motion arc -->
    <path d="M140 380 C180 280 280 180 380 140" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" opacity="0.4"/>
    <path d="M170 360 C200 280 260 220 340 190" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" opacity="0.25"/>

    <!-- Main claw: 3 dynamic talons -->
    <path d="M200 280 L280 200 L320 220 L240 320 Z" fill="#FFFFFF"/>
    <path d="M260 300 L340 220 L380 240 L300 340 Z" fill="#FFFFFF"/>
    <path d="M320 320 L400 240 L440 260 L360 360 Z" fill="#FFFFFF"/>

    <!-- X integration -->
    <path d="M180 200 L260 280" stroke="#FFFFFF" stroke-width="14" stroke-linecap="square" opacity="0.8"/>
    <path d="M260 200 L180 280" stroke="#FFFFFF" stroke-width="14" stroke-linecap="square" opacity="0.6"/>

    <!-- Forward arrow -->
    <path d="M340 140 L380 100 L420 140" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Speed lines -->
    <path d="M120 300 L160 280" stroke="#FFFFFF" stroke-width="6" stroke-linecap="square" opacity="0.5"/>
    <path d="M130 340 L170 320" stroke="#FFFFFF" stroke-width="6" stroke-linecap="square" opacity="0.5"/>
    <path d="M140 380 L180 360" stroke="#FFFFFF" stroke-width="6" stroke-linecap="square" opacity="0.5"/>
  </g>
</svg>
