<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="amber" x1="120" y1="120" x2="392" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="0.55" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="cyan" x1="144" y1="96" x2="416" y2="416" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- mark: 10× built like a precise tool jig -->
  <g filter="url(#glow)">
    <!-- '1' stem -->
    <path d="M140 120V392" stroke="url(#amber)" stroke-width="28" stroke-linecap="square"/>
    <path d="M112 156L140 120L168 156" stroke="url(#amber)" stroke-width="28" stroke-linecap="square"/>

    <!-- '0' ring (engine) -->
    <path d="M312 256m-108 0a108 108 0 1 0 216 0a108 108 0 1 0 -216 0" stroke="url(#cyan)" stroke-width="28"/>
    <path d="M312 256m-58 0a58 58 0 1 0 116 0a58 58 0 1 0 -116 0" stroke="#0B1220" stroke-width="18" opacity="0.35"/>

    <!-- × as two blades -->
    <path d="M226 168L398 344" stroke="url(#amber)" stroke-width="22" stroke-linecap="square"/>
    <path d="M398 168L226 344" stroke="url(#amber)" stroke-width="22" stroke-linecap="square"/>

    <!-- subtle claw cuts (3 notches) -->
    <path d="M408 250l34-22" stroke="#F59E0B" stroke-width="10" stroke-linecap="square" opacity="0.9"/>
    <path d="M410 286l36-18" stroke="#F59E0B" stroke-width="10" stroke-linecap="square" opacity="0.75"/>
    <path d="M402 320l34-14" stroke="#F59E0B" stroke-width="10" stroke-linecap="square" opacity="0.6"/>
  </g>

  <!-- optional safe background guide (hidden) -->
</svg>
