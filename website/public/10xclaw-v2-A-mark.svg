<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Direction A: Execution Engine - teal/amber gradient for precision + energy -->
    <linearGradient id="execGrad" x1="100" y1="100" x2="412" y2="412" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Mark: Interlocking X and gear-like ring = execution engine -->
  <g>
    <!-- Outer ring (gear teeth suggestion via notches) -->
    <circle cx="256" cy="256" r="180" stroke="url(#execGrad)" stroke-width="24"/>

    <!-- Gear notches (8 positions, simplified) -->
    <path d="M256 52 L256 76" stroke="url(#execGrad)" stroke-width="24" stroke-linecap="square"/>
    <path d="M256 436 L256 460" stroke="url(#execGrad)" stroke-width="24" stroke-linecap="square"/>
    <path d="M52 256 L76 256" stroke="url(#execGrad)" stroke-width="24" stroke-linecap="square"/>
    <path d="M436 256 L460 256" stroke="url(#execGrad)" stroke-width="24" stroke-linecap="square"/>

    <!-- X core (execution, crossing paths) -->
    <path d="M168 168 L344 344" stroke="url(#execGrad)" stroke-width="28" stroke-linecap="square"/>
    <path d="M344 168 L168 344" stroke="url(#execGrad)" stroke-width="28" stroke-linecap="square"/>

    <!-- Center hub (precision point) -->
    <circle cx="256" cy="256" r="32" fill="url(#execGrad)"/>

    <!-- Claw suggestion: 3 notches on right side -->
    <path d="M380 196 L420 180" stroke="#F59E0B" stroke-width="14" stroke-linecap="square"/>
    <path d="M380 256 L428 256" stroke="#F59E0B" stroke-width="14" stroke-linecap="square"/>
    <path d="M380 316 L420 332" stroke="#F59E0B" stroke-width="14" stroke-linecap="square"/>
  </g>
</svg>
